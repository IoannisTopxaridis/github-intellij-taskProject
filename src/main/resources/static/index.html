<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title> Task Management</title>

    <style>
        body {
            background-color: #f4f4f9;
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        button {
            background-color: #007bff;
            color: #ffffff;
            border: none;
            border-radius: 4px;
            padding: 10px 15px;
            cursor: pointer;
            margin-right: 5px;
        }

        button:hover {
            background-color: #0056b3;
        }


        li {
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 4px;
            padding: 10px 15px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-align: left;
        }


    </style>

</head>
<body>
<h1>Λίστα Εργασιών</h1>

<label for="input-title">Γράψε ένα Task..</label>
<input id="input-title" type="text">
<button onclick="getTaskFromServer()">Εμφάνιση Εργασιών</button>
<button onclick="saveTaskFromScreen()">Αποθήκευση</button>

<ul id="my-list"></ul>

<script>

    function getTaskFromServer() {                             // function getTaskFromServer() takes JSON data from Spring API and converts it to
                                                               // JavaScript arrays to view on screen

        fetch("http://localhost:8080/api/all-tasks")           // GET request to the controller
            .then(response => response.json())                 // Convert the server response to JSON and update the application
            .then(data => {
                let list = document.getElementById("my-list");
                list.innerHTML = "";                           // deletes everything currently inside it
                console.log(data);                             // browser's Developer Console debugging
                data.forEach(task => {
                    let item = document.createElement("li");
                    item.textContent = task.title;

                    let deleteBtn = document.createElement("button");
                    deleteBtn.textContent = "Διαγραφή";

                    deleteBtn.onclick = function () {
                        fetch("http://localhost:8080/api/delete-task/" + task.id, {
                            method: "DELETE"                    // HTTP method that removes data
                        })
                            .then(() => {
                                getTaskFromServer();            //automatically refresh the list after deletion
                            })

                    }
                    item.appendChild(deleteBtn);                //user can see the delete button on each list item
                    list.appendChild(item);                     //user can see the list
                });
            });
    }

    function saveTaskFromScreen() {

        let typedTitle = document.getElementById("input-title").value;

        let myNewTask = {
            title: typedTitle,
            status: "InProgress"
        };

        fetch("http://localhost:8080/api/create-task", {
            method: "POST",                                     // HTTP method that crates new data
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(myNewTask)

        })
            .then(() => {
                getTaskFromServer();                            //automatically refresh the list after creating a new item in the list
            })

    }

</script>


</body>
</html>
